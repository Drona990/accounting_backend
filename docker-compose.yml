version: '3.8'

services:
  # ==========================================================================
  # 🟢 PRODUCTION STACK SERVICES (LIVE APP)
  # ==========================================================================
  db:
    image: postgres:15-alpine
    container_name: db_accounting_local
    restart: always
    volumes:
      - postgres_data_local:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5433:5432"

  web:
    build: .
    container_name: accounting_backend_local
    command: >
      sh -c "python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             python manage.py createcachetable my_cache_table &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 accounting.asgi:application"
    volumes:
      - .:/app
      - static_volume_local:/app/staticfiles
      - media_volume_local:/app/media
    env_file:
      - .env
    restart: always 
    depends_on:
      - db

  nginx:
    image: nginx:stable-alpine
    container_name: accounting_nginx_local
    ports:
      - "8084:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume_local:/var/www/static:ro
      - media_volume_local:/var/www/media:ro
    restart: always
    depends_on:
      - web

  # ==========================================================================
  # 🧪 TESTING STACK SERVICES (SANDBOX APP)
  # ==========================================================================
  db_test:
    image: postgres:15-alpine
    container_name: db_accounting_testing
    restart: always
    volumes:
      - postgres_data_testing:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=db_accounting_testing
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345678
    ports:
      - "5434:5432"

  web_test:
    build: .
    container_name: accounting_backend_testing
    command: >
      sh -c "python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             python manage.py createcachetable test_cache_table &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8005 accounting.asgi:application"
    volumes:
      - .:/app
      - static_volume_testing:/app/staticfiles
      - media_volume_testing:/app/media
    env_file:
      - .env_test
    restart: always 
    depends_on:
      - db_test

  nginx_test:
    image: nginx:stable-alpine
    container_name: accounting_nginx_testing
    ports:
      - "8085:80"
    volumes:
      - ./nginx_test.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume_testing:/var/www/static:ro
      - media_volume_testing:/var/www/media:ro
    restart: always
    depends_on:
      - web_test

# ==========================================================================
# DATA PERSISTENCE RUNTIME VOLUMES
# ==========================================================================
volumes:
  postgres_data_local:
  static_volume_local:
  media_volume_local:
  # Isolated testing boundaries
  postgres_data_testing:
  static_volume_testing:
  media_volume_testing: