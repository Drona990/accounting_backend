version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: db_accounting_local
    restart: always
    volumes:
      - postgres_data_local:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5433:5432" # Agar laptop par pehle se postgres chal raha hai toh 5433 safe hai

  web:
    build: .
    container_name: accounting_backend_local
    # ✅ Fixed: createcachetable ka galat argument hataya aur asgi path sahi kiya
    command: >
      sh -c "python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             python manage.py createcachetable my_cache_table &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 accounting.asgi:application"
    volumes:
      - .:/app
      - static_volume_local:/app/staticfiles
      - media_volume_local:/app/media
    env_file:
      - .env
    restart: always 
    depends_on:
      - db

  nginx:
    image: nginx:stable-alpine
    container_name: accounting_nginx_local
    ports:
      - "8084:80" # Laptop par http://localhost:8084/ pe hit karne ke liye
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume_local:/var/www/static:ro
      - media_volume_local:/var/www/media:ro
    restart: always
    depends_on:
      - web

volumes:
  postgres_data_local:
  static_volume_local:
  media_volume_local: