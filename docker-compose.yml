version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: db_accounting
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: accounting_backend
    # ✅ Sequential Pipeline Execution: Makemigrations + Migrate dynamic tracking matrix updates bounds
    command: >
      sh -c "python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             python manage.py createcachetable --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 accounting.composition:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media # Named volume system allocation to isolate permission bugs
    env_file:
      - .env
    restart: always 
    depends_on:
      - db

  nginx:
    image: nginx:stable-alpine
    container_name: accounting_nginx
    ports:
      - "8084:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    restart: always
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: # Safe internal persistent storage block